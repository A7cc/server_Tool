{{template "header" .}}
<div class="help">
  <strong>说明：</strong>添加或删除聊天室用户（字母数字 _ -，最长 10）。变更会写入数据库；删除会立即踢下线。
</div>
<div class="card">
  <p style="font-size:18px;font-weight:bold">当前用户</p>
  <ul id="user-admin-list" style="list-style:none;padding:0;margin:0 0 16px 0">
    {{range .Users}}
    <li style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #eee">
      <span style="flex:1;font-weight:bold">{{.}}</span>
      <button type="button" class="del-user" data-user="{{.}}" {{if not $.AuthEnabled}}disabled{{end}} style="padding:4px 12px;font-size:13px">删除</button>
    </li>
    {{else}}
    <li class="muted">（空）</li>
    {{end}}
  </ul>
  <p style="font-size:18px;font-weight:bold">添加用户:
    <input type="text" id="username" style="width:160px" {{if not .AuthEnabled}}disabled{{end}}>
  </p>
  <button id="addusername" {{if not .AuthEnabled}}disabled{{end}}>添加</button>
  <p id="add-result" style="margin-top:12px;color:#666"></p>
</div>
<script>
function userAction(action, name, resultEl) {
  return fetch('/setuser', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user: name, action: action })
  }).then(function (response) {
    return response.text().then(function (t) {
      if (!response.ok) throw new Error(t || ('HTTP ' + response.status));
      return t;
    });
  });
}

var btn = document.getElementById('addusername');
if (btn && !btn.disabled) {
  btn.addEventListener('click', function () {
    var textInput = document.getElementById('username');
    var result = document.getElementById('add-result');
    userAction('add', textInput.value, result)
      .then(function (t) {
        result.textContent = '添加成功！' + t;
        result.className = 'ok';
        textInput.value = '';
        setTimeout(function(){ location.reload(); }, 500);
      })
      .catch(function (error) {
        result.textContent = '添加失败：' + error.message;
        result.className = 'err';
      });
  });
}

document.querySelectorAll('.del-user').forEach(function (b) {
  if (b.disabled) return;
  b.addEventListener('click', function () {
    var name = b.getAttribute('data-user');
    if (!confirm('确认删除用户「' + name + '」？在线连接将被断开。')) return;
    var result = document.getElementById('add-result');
    userAction('delete', name, result)
      .then(function (t) {
        result.textContent = '删除成功：' + t;
        result.className = 'ok';
        setTimeout(function(){ location.reload(); }, 500);
      })
      .catch(function (error) {
        result.textContent = '删除失败：' + error.message;
        result.className = 'err';
      });
  });
});
</script>
</body></html>
